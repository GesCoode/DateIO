services:
  db:
    image: postgres:16-alpine
    container_name: visagely-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: visagely
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: visagely
    volumes:
      - visagely_pg:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  app:
    build: .
    container_name: visagely
    restart: unless-stopped
    ports:
      - '3004:3000'
    environment:
      ORIGIN: ${ORIGIN:-https://visagely.com}
      DATABASE_URL: postgres://visagely:${POSTGRES_PASSWORD}@db:5432/visagely
      NODE_ENV: production
    depends_on:
      - db

volumes:
  visagely_pg:
