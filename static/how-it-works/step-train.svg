  <circle cx="60" cy="31" r="3.5" fill="#222" stroke="#4ade80" stroke-width="0.8" stroke-opacity="0.7"/>
  <path d="M54 40c2-2.5 4-3.5 6-3.5s4 1 6 3.5" stroke="#4ade80" stroke-width="0.9" stroke-opacity="0.65" stroke-linecap="round"/>

  <rect x="34" y="52" width="52" height="4" rx="2" fill="#1a1a1a"/>
  <rect x="34" y="52" width="34" height="4" rx="2" fill="#22c55e">
