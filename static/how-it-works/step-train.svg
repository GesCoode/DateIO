<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 72" fill="none" aria-hidden="true">
  <rect x="22" y="14" width="76" height="44" rx="8" fill="#0d0d0d" stroke="#262626" stroke-width="1"/>

  <circle cx="60" cy="34" r="18" stroke="#1a1a1a" stroke-width="3"/>
